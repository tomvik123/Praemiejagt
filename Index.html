<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6b1f7b" />
  <title>FDF Arnborg Præmiejagt</title>
  <style>
    :root {
      --bg: #f7f3fa;
      --card: #ffffff;
      --primary: #6b1f7b;
      --primary-dark: #4d145a;
      --accent: #f2b705;
      --text: #211526;
      --muted: #746878;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #efe4f3 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .app {
      width: min(720px, 100%);
      background: rgba(255,255,255,.97);
      border-radius: 28px;
      box-shadow: 0 18px 55px rgba(59, 23, 67, .18);
      overflow: hidden;
    }
    header {
      background: var(--primary);
      color: white;
      padding: 24px 22px 20px;
      text-align: center;
    }
    header h1 { margin: 0; font-size: clamp(1.8rem, 6vw, 3rem); }
    header p { margin: 8px 0 0; opacity: .88; }
    main { padding: 24px; }
    .counter { text-align: center; margin-bottom: 18px; }
    .label { color: var(--muted); font-weight: 800; }
    .number {
      font-size: clamp(4rem, 20vw, 8rem);
      line-height: .95;
      font-weight: 900;
      color: var(--primary);
      margin: 10px 0;
    }
    .sub { color: var(--muted); font-size: .95rem; }
    .sale-btn {
      width: 100%;
      border: 0;
      border-radius: 22px;
      background: var(--accent);
      color: #2d2100;
      font-size: clamp(2rem, 9vw, 4rem);
      font-weight: 900;
      padding: 26px 14px;
      min-height: 150px;
      box-shadow: 0 10px 0 #c79400;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }
    .sale-btn:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #c79400;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 22px;
    }
    .card {
      background: #f8f5fa;
      border: 1px solid #eadfed;
      padding: 16px;
      border-radius: 18px;
    }
    .card strong {
      display: block;
      font-size: 1.7rem;
      color: var(--primary);
      margin-top: 4px;
    }
    details {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #eadfed;
    }
    summary { cursor: pointer; font-weight: 900; color: var(--primary); }
    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }
    label { display: grid; gap: 6px; font-weight: 700; color: var(--muted); }
    input {
      width: 100%;
      border: 1px solid #d9c9de;
      border-radius: 12px;
      padding: 12px;
      font-size: 1rem;
    }
    .small-buttons {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .small-buttons button {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .save { background: var(--primary); color: white; }
    .reset { background: #efe7f2; color: var(--primary-dark); }
    .winner {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 20;
      background: radial-gradient(circle, #ffef8c 0%, #f2b705 40%, #d97b00 100%);
      color: #321b00;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }
    .winner.show { display: grid; }
    .winner-box { position: relative; z-index: 3; animation: pop .45s ease-out; }
    .winner h2 { margin: 0; font-size: clamp(4rem, 18vw, 10rem); line-height: .9; }
    .winner p { font-size: clamp(1.6rem, 6vw, 3rem); font-weight: 900; margin: 22px 0; }
    .winner button {
      border: 0;
      border-radius: 18px;
      background: var(--primary);
      color: white;
      font-size: 1.25rem;
      font-weight: 900;
      padding: 16px 24px;
      cursor: pointer;
    }
    .confetti {
      position: fixed;
      width: 12px;
      height: 20px;
      top: -30px;
      z-index: 2;
      animation: fall linear forwards;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(900deg); } }
    @keyframes pop {
      0% { transform: scale(.55); opacity: 0; }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      padding: 0 20px 20px;
    }
    @media (max-width: 520px) {
      main { padding: 18px; }
      .grid, .settings-row { grid-template-columns: 1fr; }
      .sale-btn { min-height: 130px; }
    }
  </style>
</head>
<body>
  <section class="app">
    <header>
      <h1>🎉 FDF Arnborg Præmiejagt</h1>
      <p>Tryk én gang for hvert køb, der giver et lod</p>
    </header>

    <main>
      <div class="counter">
        <div class="label">KØB SIDEN SIDSTE GEVINST</div>
        <div class="number" id="roundCount">0</div>
        <div class="sub">Næste gevinst udløses tilfældigt</div>
      </div>

      <button class="sale-btn" id="saleBtn">+ NYT KØB</button>

      <div class="grid">
        <div class="card">
          <span>Samlet antal køb</span>
          <strong id="totalSales">0</strong>
        </div>
        <div class="card">
          <span>Antal gevinster</span>
          <strong id="totalWins">0</strong>
        </div>
      </div>

      <details>
        <summary>Indstillinger</summary>
        <div class="settings-row">
          <label>
            Minimum køb mellem gevinster
            <input id="minSales" type="number" min="1" value="15">
          </label>
          <label>
            Maksimum køb mellem gevinster
            <input id="maxSales" type="number" min="2" value="35">
          </label>
        </div>
        <div class="small-buttons">
          <button class="save" id="saveSettings">Gem indstillinger</button>
          <button class="reset" id="resetRound">Nulstil runde</button>
          <button class="reset" id="resetAll">Nulstil alt</button>
        </div>
      </details>
    </main>

    <footer>
      Virker offline efter filen er åbnet. Lyd kræver, at enheden ikke er på lydløs.
    </footer>
  </section>

  <section class="winner" id="winner">
    <div class="winner-box">
      <h2>🎉</h2>
      <p>DU HAR VUNDET EN PRÆMIE!</p>
      <button id="closeWinner">Start næste runde</button>
    </div>
  </section>

  <script>
    const roundCountEl = document.getElementById("roundCount");
    const totalSalesEl = document.getElementById("totalSales");
    const totalWinsEl = document.getElementById("totalWins");
    const minSalesEl = document.getElementById("minSales");
    const maxSalesEl = document.getElementById("maxSales");
    const winnerEl = document.getElementById("winner");

    let state = JSON.parse(localStorage.getItem("praemiejagtState")) || {
      roundCount: 0,
      totalSales: 0,
      totalWins: 0,
      minSales: 15,
      maxSales: 35,
      target: null
    };

    function randomTarget(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function ensureTarget() {
      if (!state.target) {
        state.target = randomTarget(state.minSales, state.maxSales);
      }
    }

    function save() {
      localStorage.setItem("praemiejagtState", JSON.stringify(state));
    }

    function render() {
      roundCountEl.textContent = state.roundCount;
      totalSalesEl.textContent = state.totalSales;
      totalWinsEl.textContent = state.totalWins;
      minSalesEl.value = state.minSales;
      maxSalesEl.value = state.maxSales;
      save();
    }

    function playWinnerSound() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      const ctx = new AudioCtx();
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "square";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.001, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + i * 0.15 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.28);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.3);
      });
    }

    function confetti() {
      const colors = ["#6b1f7b", "#f2b705", "#ffffff", "#e53935", "#1e88e5", "#43a047"];
      for (let i = 0; i < 90; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2 + Math.random() * 3) + "s";
        piece.style.animationDelay = (Math.random() * 0.7) + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 6000);
      }
    }

    function triggerWinner() {
      state.totalWins++;
      save();
      render();
      winnerEl.classList.add("show");
      playWinnerSound();
      confetti();
      if (navigator.vibrate) navigator.vibrate([250, 100, 250, 100, 500]);
    }

    document.getElementById("saleBtn").addEventListener("click", () => {
      ensureTarget();
      state.roundCount++;
      state.totalSales++;
      render();

      if (state.roundCount >= state.target) {
        triggerWinner();
      }
    });

    document.getElementById("closeWinner").addEventListener("click", () => {
      state.roundCount = 0;
      state.target = randomTarget(state.minSales, state.maxSales);
      winnerEl.classList.remove("show");
      render();
    });

    document.getElementById("saveSettings").addEventListener("click", () => {
      const min = Math.max(1, Number(minSalesEl.value));
      const max = Math.max(min + 1, Number(maxSalesEl.value));
      state.minSales = min;
      state.maxSales = max;
      state.target = randomTarget(min, max);
      state.roundCount = 0;
      render();
      alert("Indstillinger gemt. Ny runde er startet.");
    });

    document.getElementById("resetRound").addEventListener("click", () => {
      state.roundCount = 0;
      state.target = randomTarget(state.minSales, state.maxSales);
      render();
    });

    document.getElementById("resetAll").addEventListener("click", () => {
      if (!confirm("Vil du nulstille alle køb og gevinster?")) return;
      state.roundCount = 0;
      state.totalSales = 0;
      state.totalWins = 0;
      state.target = randomTarget(state.minSales, state.maxSales);
      render();
    });

    ensureTarget();
    render();
  </script>
</body>
</html>
