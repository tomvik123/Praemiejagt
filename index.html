<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">

<title>FDF Præmiejagt</title>
<style>
:root{--black:#050505;--white:#fff;--grey:#ededed;--muted:#686868;--gold:#d2ad47}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#efefef;color:var(--black)}
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:grid;place-items:center;padding:14px}
button,input,select{font:inherit}.app{width:min(760px,100%);background:#fff;border:3px solid #000;border-radius:28px;overflow:hidden;box-shadow:0 20px 55px #0002}
header{background:#000;color:#fff;padding:18px 20px;display:flex;align-items:center;gap:16px}
.logo{width:76px;height:76px;background:#fff;border-radius:18px;padding:8px;object-fit:contain}
h1{margin:0;font-size:clamp(1.55rem,5vw,2.5rem);line-height:1}.tag{margin:7px 0 0;color:#ccc;font-weight:700}
main{padding:22px}.hero{text-align:center;border:2px solid #000;border-radius:24px;padding:22px;background:linear-gradient(#fff,#f6f6f6)}
.eyebrow{font-weight:900;letter-spacing:.13em;font-size:.8rem;color:var(--muted)}.count{font-size:clamp(5rem,22vw,10rem);font-weight:1000;line-height:.85;margin:18px 0 12px;letter-spacing:-.06em}.hint{color:var(--muted);font-weight:700}
.sale{width:100%;min-height:170px;margin-top:18px;border:4px solid #000;border-radius:26px;background:#fff;font-size:clamp(2.1rem,10vw,4.4rem);font-weight:1000;box-shadow:0 10px 0 #000;cursor:pointer;touch-action:manipulation}
.sale:active{transform:translateY(8px);box-shadow:0 2px 0 #000;background:#eee}
.stats{margin-top:22px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stat{border:2px solid #000;border-radius:18px;padding:16px}.stat span{display:block;color:var(--muted);font-weight:800;font-size:.85rem}.stat strong{display:block;font-size:1.8rem;margin-top:4px}
.track{margin-top:18px;border:2px solid #000;border-radius:999px;overflow:hidden;height:16px}.bar{height:100%;width:0;background:#000;transition:.2s}.message{text-align:center;color:var(--muted);font-weight:700;margin-top:12px;min-height:1.4em}
details{margin-top:22px;border-top:2px solid #000;padding-top:18px}summary{font-weight:1000;cursor:pointer}.settings{display:grid;gap:14px;margin-top:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:grid;gap:7px;color:var(--muted);font-weight:800;font-size:.92rem}input,select{width:100%;padding:13px;border:2px solid #000;border-radius:12px;background:#fff}
.actions{display:flex;flex-wrap:wrap;gap:10px}.actions button{border:2px solid #000;border-radius:12px;padding:12px 14px;font-weight:900;background:#fff;cursor:pointer}.actions .primary{background:#000;color:#fff}.actions .danger{color:#a0001a;border-color:#a0001a}
footer{text-align:center;color:var(--muted);font-size:.82rem;padding:0 22px 22px}
.winner{position:fixed;inset:0;display:none;place-items:center;z-index:50;background:#000;color:#fff;padding:22px;overflow:hidden}.winner.show{display:grid}.winner:before{content:"";position:absolute;inset:-40%;background:repeating-conic-gradient(#fff 0 8deg,#000 8deg 16deg);opacity:.12;animation:spin 8s linear infinite}
.winbox{position:relative;z-index:2;width:min(700px,100%);text-align:center;border:4px solid #fff;border-radius:30px;padding:30px 22px;background:#000d;animation:pop .45s ease-out}.winbox img{width:110px;height:110px;object-fit:contain;background:#fff;border-radius:22px;padding:10px}.winner h2{font-size:clamp(3.2rem,15vw,8rem);line-height:.9;margin:22px 0 10px}.prize{font-size:clamp(1.5rem,6vw,3rem);font-weight:1000;margin:12px 0 24px}.winner button{border:3px solid #fff;border-radius:16px;background:#fff;color:#000;font-weight:1000;padding:16px 22px;font-size:1.2rem}
.confetti{position:fixed;top:-24px;width:10px;height:22px;z-index:60;animation:fall linear forwards;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes pop{0%{transform:scale(.55);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}@keyframes fall{to{transform:translateY(115vh) rotate(900deg)}}
@media(max-width:620px){body{padding:0;place-items:start center}.app{min-height:100vh;border-radius:0;border-left:0;border-right:0}header{padding:14px 16px}.logo{width:62px;height:62px}main{padding:16px}.stats,.grid{grid-template-columns:1fr}.sale{min-height:145px}}
</style>
</head>

<script>
(()=>{"use strict";
const K="fdfPraemiejagtV2",D={roundCount:0,totalSales:0,totalWins:0,minSales:15,maxSales:35,target:null,prizeText:"Tillykke – du har vundet en præmie!",volume:.25};
const $=id=>document.getElementById(id),E={round:$("roundCount"),sales:$("totalSales"),wins:$("totalWins"),rate:$("winRate"),sale:$("saleBtn"),min:$("minSales"),max:$("maxSales"),text:$("prizeText"),vol:$("volume"),bar:$("progress"),msg:$("message"),winner:$("winner"),winText:$("winnerPrize")};
let S;try{S={...D,...JSON.parse(localStorage.getItem(K)||"{}")}}catch{S={...D}}let open=false;
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;function target(){if(!Number.isFinite(S.target)||S.target<1)S.target=rnd(S.minSales,S.maxSales)}
function save(){localStorage.setItem(K,JSON.stringify(S))}
function render(){target();E.round.textContent=S.roundCount;E.sales.textContent=S.totalSales;E.wins.textContent=S.totalWins;E.rate.textContent=(S.totalSales?(S.totalWins/S.totalSales*100).toFixed(1):0)+"%";E.min.value=S.minSales;E.max.value=S.maxSales;E.text.value=S.prizeText;E.vol.value=String(S.volume);E.bar.style.width=Math.min(100,S.roundCount/S.target*100)+"%";E.msg.textContent=S.target-S.roundCount<=3?"Der kan komme en gevinst når som helst.":"Systemet er klar.";save()}
function next(){S.roundCount=0;S.target=rnd(S.minSales,S.maxSales);render()}
function sound(){const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const c=new A(),notes=[392,523.25,659.25,783.99,1046.5];notes.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain(),t=c.currentTime+i*.13;o.type=i%2?"sawtooth":"square";o.frequency.value=f;g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(S.volume,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.28);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.3)});setTimeout(()=>c.close(),1500)}
function confetti(){let colors=["#fff","#bbb","#555","#000","#d2ad47"];for(let i=0;i<110;i++){let p=document.createElement("div");p.className="confetti";p.style.left=Math.random()*100+"vw";p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDuration=2.2+Math.random()*2.8+"s";p.style.animationDelay=Math.random()*.7+"s";document.body.appendChild(p);setTimeout(()=>p.remove(),6000)}}
function win(count=true){if(open)return;open=true;if(count)S.totalWins++;E.winText.textContent=S.prizeText;E.winner.classList.add("show");sound();confetti();navigator.vibrate?.([250,120,250,120,600]);render()}
function register(){if(open)return;target();S.roundCount++;S.totalSales++;S.roundCount>=S.target?win(true):render()}
E.sale.onclick=register;$("closeWinner").onclick=()=>{open=false;E.winner.classList.remove("show");next()};
$("saveSettings").onclick=()=>{let a=Math.max(1,+E.min.value||1),b=Math.max(a+1,+E.max.value||a+1);S.minSales=a;S.maxSales=b;S.prizeText=E.text.value.trim()||D.prizeText;S.volume=+E.vol.value||D.volume;next();alert("Indstillingerne er gemt, og en ny runde er startet.")};
$("testWinner").onclick=()=>{S.prizeText=E.text.value.trim()||D.prizeText;S.volume=+E.vol.value||D.volume;win(false)};
$("resetRound").onclick=()=>confirm("Vil du nulstille den aktuelle runde?")&&next();
$("resetAll").onclick=()=>{if(confirm("Vil du nulstille alle køb, gevinster og indstillinger?")){S={...D};next()}};
document.addEventListener("keydown",e=>{if(e.code==="Space"&&!open){e.preventDefault();register()}if(e.code==="Escape"&&open)$("closeWinner").click()});render();
})();
</script>
